services:
  alojamiento-postgres:
    container_name: "alojamiento-postgres"
    image: "postgres:15-alpine"
    ports:
      - "5432:5432"
    attach: false
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - "postgres-data:/var/lib/postgresql/data"

  alojamiento-backend:
    build: ./backend
    container_name: alojamiento-backend
    ports:
      - "8080:8080"
    depends_on:
      - alojamiento-postgres
    env_file:
      - ./backend/.env

  alojamiento-frontend:
    container_name: alojamiento-frontend
    build:
      context: ./frontend
      args:
        - NODE_ENV
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=production
    ports:
      - "5173:80"
    depends_on:
      - alojamiento-backend

volumes:
  postgres-data:
