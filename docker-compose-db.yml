services:
  alojamiento-db:
    container_name: "alojamiento-db"
    image: "postgres:15-alpine"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - "alojamiento-data:/var/lib/postgresql/data"

volumes:
  alojamiento-data:
